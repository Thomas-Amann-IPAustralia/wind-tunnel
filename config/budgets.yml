# config/budgets.yml — per-stage call budgets + expected_range hints
#
# Governs: TECH_SPEC.md §6 (status.json expected_range) and §13 (budgets).
# Committed, non-secret (CLAUDE.md §6).
#
# Budgets are asserted at run time so a runaway loop trips a guard rather than
# silently burning tokens (§13). expected_range_seconds feeds the transparency
# animation's per-phase timing hints in status.json (§6.1).
#
# SCAFFOLD counts derived from the tech-spec worked example (§13):
#   2 generalists + 1 reconciler; 6 specialists x (1 draft + 1 revise);
#   1 architect; reviewer x <=2 cycles x affected specialists. Each specialist
#   call is internally bounded to fetch.max_rounds tool rounds (retrieval.yml,
#   TECH_SPEC §8.1). Tune with real run actuals.

stages:
  threshold_drafting:
    max_calls: 2            # two generalists, parallel + independent
    expected_range_seconds: [30, 120]
  threshold_reconciling:
    max_calls: 1            # reconciler
    expected_range_seconds: [20, 90]
  full_drafting:
    max_calls: 6            # six specialists, one draft each
    expected_range_seconds: [90, 300]
  architect:
    max_calls: 1
    expected_range_seconds: [20, 90]
  reviewer:
    max_cycles: 2           # internal loop cap (brief §7, §11)
    max_calls_per_cycle: 6  # <= affected specialists per cycle
    expected_range_seconds: [60, 240]

# Global guard: hard ceiling across a whole run (scaffold — raise if legitimate).
run_max_calls: 60

# §5.4 fan-out width: how many specialists draft/revise at once within one job.
# Bounded below the full six so the burst of tool-loop calls respects the Gemini
# rate budget (§13) — raise toward 6 as quota allows.
specialist_concurrency: 3
