# prompts/manifest.yml — role -> current prompt file -> model role
#
# Governs: TECH_SPEC.md §9. Committed, non-secret.
#
# Maps each agent role to its current versioned prompt file (prompts/<role>.v<N>.md)
# and to a model role in config/models.yml. No prompt files exist yet — this is
# the registry the next instance fills in as it authors each prompt.
#
# Shape (populate as prompts are written):
#
# prompts:
#   interviewer:
#     file: interviewer.v1.md
#     model_role: interviewer        # resolves via config/models.yml
#
# Roles still to author (from config/models.yml): outline_synth (deferred — the
# interviewer writes outline sections directly, so no separate synthesis role is used yet).

prompts:
  interviewer:
    file: interviewer.v1.md
    model_role: interviewer            # resolves via config/models.yml (Flash-Lite)
                                        # one co-design Brainstorm turn: reply + write
                                        # resolved outline sections (§7, §7.1)
  sufficiency:
    file: sufficiency.v1.md
    model_role: sufficiency            # resolves via config/models.yml (Flash-Lite)
                                        # the judged half of the sufficiency rubric —
                                        # contradictions + happy-path narratability (§7.1)
  feasibility_gate:
    file: feasibility_gate.v1.md
    model_role: feasibility_gate       # resolves via config/models.yml (Flash-Lite)
                                        # POST /poc runs this first: would a static HTML PoC
                                        # meaningfully visualise this solution? (§7, brief §6.1)
  poc_gen:
    file: poc_gen.v1.md
    model_role: poc_gen                # resolves via config/models.yml (Flash)
                                        # a single self-contained HTML PoC with the limitations
                                        # banner authored into the file (§7, §12.3/§12.4)
  map_gen:
    file: map_gen.v1.md
    model_role: map_gen                # resolves via config/models.yml (Flash)
                                        # the information-flow map as Mermaid; the SPA renders
                                        # SVG client-side (§7, §12.3; CLAUDE.md §9)
  threshold_generalist:
    file: threshold_generalist.v1.md
    model_role: threshold_generalist   # resolves via config/models.yml (Flash)
  threshold_reconciler:
    file: threshold_reconciler.v1.md
    model_role: threshold_reconciler   # resolves via config/models.yml (Pro)
  specialist:
    file: specialist.v1.md
    model_role: specialist             # resolves via config/models.yml (Flash)
                                        # shared by all six full-assessment specialists
                                        # (owned sections + KB vary per call, not the prompt)
  architect:
    file: architect.v1.md
    model_role: architect              # resolves via config/models.yml (Pro)
                                        # writes the Implementation Plan appendix after
                                        # every specialist is final (§5.1 ARCHITECT)
  reviewer:
    file: reviewer.v1.md
    model_role: reviewer               # resolves via config/models.yml (Pro)
                                        # audits coverage + coherence, issues amend
                                        # directives, judges residual 12.3/12.4 (§5.1
                                        # REVIEW, §11); the engine computes the ratings
  revision_triage:
    file: revision_triage.v1.md
    model_role: reviewer               # resolves via config/models.yml (Pro)
                                        # USER_REVISION step 1 (§5.8): triages the user's
                                        # revision request into amend directives + declines
  revision_verify:
    file: revision_verify.v1.md
    model_role: reviewer               # resolves via config/models.yml (Pro)
                                        # USER_REVISION step 3 (§5.8): one verification pass —
                                        # confirms directives met, re-judges residual
