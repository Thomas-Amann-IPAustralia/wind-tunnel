# prompts/manifest.yml — role -> current prompt file -> model role
#
# Governs: TECH_SPEC.md §9. Committed, non-secret.
#
# Maps each agent role to its current versioned prompt file (prompts/<role>.v<N>.md)
# and to a model role in config/models.yml. No prompt files exist yet — this is
# the registry the next instance fills in as it authors each prompt.
#
# Shape (populate as prompts are written):
#
# prompts:
#   interviewer:
#     file: interviewer.v1.md
#     model_role: interviewer        # resolves via config/models.yml
#
# Roles still to author (from config/models.yml): interviewer, sufficiency,
# feasibility_gate, outline_synth, poc_gen, map_gen,
# specialist (per-specialist owned DTA sections — §9.3), architect, reviewer.

prompts:
  threshold_generalist:
    file: threshold_generalist.v1.md
    model_role: threshold_generalist   # resolves via config/models.yml (Flash)
  threshold_reconciler:
    file: threshold_reconciler.v1.md
    model_role: threshold_reconciler   # resolves via config/models.yml (Pro)
