# Frontend deploy to GitHub Pages (CLAUDE.md §9). Path-filtered to frontend/**
# so the pipeline's ~20s status commits during a run never trigger a needless
# rebuild. The SPA is path-aware (Vite base=/wind-tunnel/) and hash-routed, so
# Pages serves index.html for every route with no server-side rewrites.
name: Deploy frontend to Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # The production backend base URL (Render). Set as a repo variable so a
          # fork can point the SPA at its own backend without editing config.ts.
          VITE_BACKEND_URL: ${{ vars.WINDTUNNEL_BACKEND_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
